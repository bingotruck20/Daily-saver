<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lommepenge">
    <title>Budget Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --primary: #4CAF50; /* Grøn til indtægt */
            --danger: #f44336;  /* Rød til udgift */
            --surface: #1e1e1e;
            --accent: #FFC107;  /* Gul til SU-mål */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: env(safe-area-inset-top) 20px 20px; text-align: center; }
        
        .header { margin-top: 40px; margin-bottom: 30px; }
        .balance-label { font-size: 1rem; color: #aaaaaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        /* Gør saldoen klikbar via CSS */
        .balance-amount { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #ffffff; cursor: pointer; text-decoration: underline; text-decoration-color: #333; }
        .balance-amount:active { opacity: 0.7; }
        .edit-hint { font-size: 0.8rem; color: #666; }

        .card { background-color: var(--surface); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .goal-card { background-color: #2a2200; border: 1px solid var(--accent); display: none; }
        .goal-title { font-size: 1.2rem; color: var(--accent); margin-bottom: 10px; font-weight: bold; }
        .goal-desc { font-size: 0.9rem; margin-bottom: 15px; color: #dddddd; }
        .btn-goal { background-color: var(--accent); color: #000; }
        
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #333; border-radius: 8px; background: #2c2c2c; color: white; font-size: 1rem; }
        button { width: 100%; padding: 15px; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button:active { opacity: 0.8; }
        .btn-income { background-color: var(--primary); }
        .btn-expense { background-color: var(--danger); }
        
        .history { text-align: left; margin-top: 30px; }
        .history h3 { font-size: 1.2rem; margin-bottom: 15px; color: #aaaaaa; }
        .transaction { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; }
        .t-desc { font-weight: 500; }
        .t-date { font-size: 0.8rem; color: #888; }
        .t-amount { font-weight: bold; }
        .t-amount.positive { color: var(--primary); }
        .t-amount.negative { color: var(--danger); }
        .t-amount.goal { color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-label">Nuværende Saldo</div>
        <div class="balance-amount" id="balanceDisplay" onclick="editBalance()">0 kr.</div>
        <div class="edit-hint">Tryk på beløbet for at rette saldoen manuelt</div>
    </div>

    <div class="card goal-card" id="goalCard">
        <div class="goal-title">🎉 1.000 kr. grænsen er nået!</div>
        <div class="goal-desc">Du har opsparet over 1.000 kr. Overfør 500 kr. til dit SU-lån via netbanken for at fastholde Niveau 2 strategien.</div>
        <button class="btn-goal" onclick="paySUDebt()">Registrér 500 kr. overført</button>
    </div>

    <div class="card">
        <input type="number" id="incomeInput" placeholder="Tilføj dagens beløb (kr.)" inputmode="decimal">
        <button class="btn-income" onclick="addIncome()">Tilføj til opsparing</button>
    </div>

    <div class="card">
        <input type="text" id="descInput" placeholder="Hvad har du købt? (f.eks. Kaffe)" autocomplete="off">
        <input type="number" id="amountInput" placeholder="Brugt beløb (kr.)" inputmode="decimal">
        <button class="btn-expense" onclick="addExpense()">Registrér udgift</button>
    </div>

    <div class="history">
        <h3>Historik</h3>
        <div id="historyList"></div>
    </div>

    <script>
        const GOAL_THRESHOLD = 1000.00;
        const GOAL_PAYMENT = 500.00;
        
        // State management
        let state = JSON.parse(localStorage.getItem('budgetStateManual')) || {
            balance: 0,
            transactions: []
        };

        // Manuel overskrivning af saldo (f.eks. til at starte på 545 kr)
        function editBalance() {
            const newBalance = prompt("Indtast din præcise nuværende saldo (kr.):", state.balance);
            if (newBalance !== null && !isNaN(parseFloat(newBalance.replace(',', '.')))) {
                state.balance = parseFloat(newBalance.replace(',', '.'));
                
                state.transactions.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleDateString('da-DK'),
                    desc: "Saldo rettet manuelt",
                    amount: state.balance,
                    type: "neutral"
                });
                
                updateStateAndRender();
            }
        }

        // Tilføj dagligt rådighedsbeløb
        function addIncome() {
            const amountStr = document.getElementById('incomeInput').value.replace(',', '.');
            const amount = parseFloat(amountStr);

            if (isNaN(amount) || amount <= 0) {
                alert("Indtast et gyldigt beløb.");
                return;
            }

            state.balance += amount;
            
            state.transactions.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString('da-DK'),
                desc: "Dagligt beløb tilføjet",
                amount: amount,
                type: "positive"
            });

            document.getElementById('incomeInput').value = '';
            updateStateAndRender();
        }

        // Registrer udgift
        function addExpense() {
            const desc = document.getElementById('descInput').value.trim();
            const amountStr = document.getElementById('amountInput').value.replace(',', '.');
            const amount = parseFloat(amountStr);

            if (!desc || isNaN(amount) || amount <= 0) {
                alert("Indtast venligst en beskrivelse og et gyldigt beløb.");
                return;
            }

            state.balance -= amount;
            
            state.transactions.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString('da-DK'),
                desc: desc,
                amount: amount,
                type: "negative"
            });

            document.getElementById('descInput').value = '';
            document.getElementById('amountInput').value = '';
            updateStateAndRender();
        }

        // Ekstraordinært afdrag
        function paySUDebt() {
            if (state.balance >= GOAL_PAYMENT) {
                state.balance -= GOAL_PAYMENT;
                
                state.transactions.unshift({
                    id: Date.now(),
                    date: new Date().toLocaleDateString('da-DK'),
                    desc: "Ekstraordinært afdrag: SU-lån",
                    amount: GOAL_PAYMENT,
                    type: "goal"
                });
                
                updateStateAndRender();
            }
        }

        function updateStateAndRender() {
            // Behold kun de seneste 50 transaktioner for at undgå at LocalStorage fyldes
            if(state.transactions.length > 50) state.transactions = state.transactions.slice(0, 50);
            
            localStorage.setItem('budgetStateManual', JSON.stringify(state));
            render();
        }

        function render() {
            document.getElementById('balanceDisplay').innerText = state.balance.toFixed(2).replace('.', ',') + ' kr.';
            
            const goalCard = document.getElementById('goalCard');
            if (state.balance >= GOAL_THRESHOLD) {
                goalCard.style.display = 'block';
            } else {
                goalCard.style.display = 'none';
            }
            
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            state.transactions.forEach(t => {
                const div = document.createElement('div');
                div.className = 'transaction';
                
                let amountDisplay = "";
                let amountClass = "t-amount";
                
                if (t.type === "positive") {
                    amountDisplay = "+" + t.amount.toFixed(2).replace('.', ',') + " kr.";
                    amountClass += " positive";
                } else if (t.type === "negative") {
                    amountDisplay = "-" + t.amount.toFixed(2).replace('.', ',') + " kr.";
                    amountClass += " negative";
                } else if (t.type === "goal") {
                    amountDisplay = "-" + t.amount.toFixed(2).replace('.', ',') + " kr.";
                    amountClass += " goal";
                } else {
                    amountDisplay = t.amount.toFixed(2).replace('.', ',') + " kr.";
                }

                div.innerHTML = `
                    <div>
                        <div class="t-desc">${t.desc}</div>
                        <div class="t-date">${t.date}</div>
                    </div>
                    <div class="${amountClass}">${amountDisplay}</div>
                `;
                historyList.appendChild(div);
            });
        }

        // Initial render
        render();
    </script>
</body>
</html>
